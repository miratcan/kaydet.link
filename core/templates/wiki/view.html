{% extends "base.html" %}
{% load i18n %}

{% block title %}{{ page.name }} — {% translate "Wiki" %} — {{ site_name }}{% endblock %}

{% block content %}
<article class="wiki-content">
    <header>
        <h1>{{ page.name }}</h1>
        {% if user.is_authenticated %}
            <a href="{% url 'wiki-edit' slug=page.slug %}">{% translate "Edit" %}</a>
        {% endif %}
    </header>
    <div>{{ page.content_html|safe }}</div>
</article>
{% endblock %}
