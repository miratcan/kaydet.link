{% extends "base.html" %}
{% load i18n %}

{% block title %}{% translate "Login" %} — {{ site_name }}{% endblock %}

{% block content %}
<section class="auth-page">
    <h1>{% translate "Login" %}</h1>
    <form method="post" class="form-standalone">
        {% csrf_token %}
        {% include "forms/fields.html" %}
        <button type="submit">{% translate "Login" %}</button>
    </form>
    <p><a href="{% url 'register' %}">{% translate "Don't have an account? Register" %}</a></p>
</section>
{% endblock %}
