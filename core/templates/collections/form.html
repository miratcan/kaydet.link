{% extends "base.html" %}
{% load i18n %}

{% block title %}{{ form_title }} — {{ site_name }}{% endblock %}

{% block content %}
<section>
    <h1 class="page-title">{{ form_title }}</h1>
    <div class="form-narrow">
        <form method="post">
            {% csrf_token %}

            <div class="form-field">
                <label for="id_name">{% translate "Name" %}</label>
                {{ form.name }}
                {{ form.name.errors }}
            </div>

            <div class="form-field">
                <label for="id_description">{% translate "Description" %}</label>
                {{ form.description }}
                {{ form.description.errors }}
            </div>

            <div class="form-field form-field-checkbox">
                <label class="checkbox-label">
                    {{ form.is_private }}
                    <span>{% translate "Private — only you can see this" %}</span>
                </label>
            </div>

            <button type="submit" class="btn-full">{% translate "Save" %}</button>
        </form>
    </div>
</section>
{% endblock %}
